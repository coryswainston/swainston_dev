<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support - Swainston Software Development</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page">
        <a class="back" href="index.html">&larr; Back</a>

        <div class="support-header">
            <img id="app-icon" src="" alt="">
            <h1 id="app-name"></h1>
        </div>

        <form id="support-form" class="support-form" action="https://formspree.io/f/xojyglbp" method="POST">
            <input type="hidden" id="app-field" name="app" value="">

            <label for="email">Your email</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required>

            <label for="message">How can we help?</label>
            <textarea id="message" name="message" rows="6" placeholder="Describe your issue or request..." required></textarea>

            <button type="submit">Send Request</button>
        </form>

        <div id="success-message" class="success-message" hidden>
            <p>Thanks for reaching out! We'll get back to you as soon as possible.</p>
        </div>

        <p class="support-alt">You can also email us directly at <a href="mailto:cory@swainston.dev">cory@swainston.dev</a>.</p>
    </div>

    <script>
        const apps = {
            'playing-time': {
                name: 'Playing Time: Easy Rotations',
                icon: 'assets/playing-time-icon.png'
            },
            'blackjack': {
                name: 'Blackjack + Card Counting',
                icon: 'assets/blackjack-icon.png'
            }
        };

        const params = new URLSearchParams(window.location.search);
        const appKey = params.get('app');
        const app = apps[appKey];

        if (app) {
            document.getElementById('app-icon').src = app.icon;
            document.getElementById('app-icon').alt = app.name + ' icon';
            document.getElementById('app-name').textContent = app.name;
            document.getElementById('app-field').value = app.name;
            document.title = app.name + ' - Support';
        } else {
            document.getElementById('app-name').textContent = 'Support';
            document.querySelector('.support-header').classList.add('no-icon');
        }
    </script>
</body>
</html>
